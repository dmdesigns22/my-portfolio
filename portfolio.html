<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Filip — Portfolio</title>
  <link rel="stylesheet" href="https://fonts.cdnfonts.com/css/thegoodmonolith" />
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.13.0/dist/gsap.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.13.0/dist/Draggable.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.13.0/dist/InertiaPlugin.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.13.0/dist/CustomEase.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.13.0/dist/Flip.min.js"></script>
  <style>
    @font-face {
      font-family: "PPNeueMontreal";
      src: url("https://assets.codepen.io/7558/PPNeueMontreal-Variable.woff2") format("woff2");
      font-weight: 100 900;
      font-style: normal;
    }

    :root {
      --spacing-base: 1rem;
      --spacing-md: 1.5rem;
      --spacing-lg: 2rem;
      --color-text: #ffffff;
      --transition-medium: 0.3s ease;
      --font-size-base: 14px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }

    body {
      font-family: "PPNeueMontreal", sans-serif;
      background: #000;
      overflow: hidden;
      height: 100vh;
      cursor: grab;
    }
    body.dragging { cursor: grabbing; }
    body.zoom-mode { cursor: default; }

    /* Header / Footer */
    .header, .footer {
      position: fixed; left: 0; width: 100vw; padding: 1.5rem;
      z-index: 10000; display: grid;
      grid-template-columns: repeat(12, 1fr);
      column-gap: var(--spacing-base);
      pointer-events: none; opacity: 0;
    }
    .header > *, .footer > * { pointer-events: auto; }
    .header { top: 0; }
    .footer { bottom: 0; }

    .nav-section      { grid-column: 1 / span 3; }
    .values-section   { grid-column: 5 / span 2; }
    .location-section { grid-column: 7 / span 2; }
    .contact-section  { grid-column: 9 / span 2; }
    .social-section   { grid-column: 11 / span 2; text-align: right; }
    .info-section     { grid-column: 9 / span 4; text-align: right; }

    .logo-container {
      margin-bottom: var(--spacing-md); display: block;
      width: 3rem; height: 1.5rem; position: relative; cursor: pointer;
    }
    .logo-circles { position: relative; width: 100%; height: 100%; }
    .circle {
      position: absolute; border-radius: 50%;
      transition: transform var(--transition-medium);
      width: 1.4rem; height: 1.4rem;
      background-color: var(--color-text); top: 50%;
    }
    .circle-1 { left: 0; transform: translate(0, -50%); }
    .circle-2 { left: 0.8rem; transform: translate(0, -50%); mix-blend-mode: exclusion; }
    .logo-container:hover .circle-1 { transform: translate(-0.5rem, -50%); }
    .logo-container:hover .circle-2 { transform: translate(0.5rem, -50%); }

    a {
      position: relative; cursor: pointer; color: var(--color-text);
      padding: 0; display: inline-block; z-index: 1;
      text-decoration: none; font-size: var(--font-size-base);
      opacity: 1; transition: color var(--transition-medium); font-weight: 700;
    }
    a::after {
      content: ""; position: absolute; top: 0; left: 0;
      width: 0; height: 100%; background-color: var(--color-text);
      z-index: -1; transition: width 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    a:hover::after { width: 100%; }
    a:hover { color: black; mix-blend-mode: difference; opacity: 1; }

    p { display: block; color: #fff; font-size: 14px; font-weight: 600; letter-spacing: -0.01rem; -webkit-font-smoothing: antialiased; }
    ul { list-style: none; }
    h3 { font-size: 14px; margin-bottom: var(--spacing-base); font-weight: 600; color: #fff; }
    .footer p { font-family: "TheGoodMonolith", monospace; }

    /* Viewport / Canvas */
    .viewport { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; overflow: hidden; z-index: 1; opacity: 0; }
    .canvas-wrapper { position: absolute; top: 0; left: 0; transform-origin: 0 0; will-change: transform; isolation: isolate; }
    .grid-container { position: relative; width: 100%; height: 100%; }

    .grid-item {
      position: absolute; width: 320px; height: 320px;
      background: #111; cursor: pointer; will-change: transform, opacity;
      z-index: 1; opacity: 1; transition: opacity 0.6s ease;
    }
    .grid-item.out-of-view { opacity: 0.1; }
    .grid-item.selected { z-index: 2 !important; }
    .grid-item img { width: 100%; height: 100%; object-fit: cover; display: block; user-select: none; pointer-events: none; }

    /* Split Screen */
    .split-screen-container {
      position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
      display: flex; z-index: 2; opacity: 0; pointer-events: none;
    }
    .split-screen-container.active { opacity: 1; pointer-events: all; }
    .split-left, .split-right {
      position: relative; width: 50vw; height: 100vh;
      background: rgba(0,0,0,0.6); display: flex;
      justify-content: center; align-items: center; z-index: 1; cursor: pointer;
    }
    .zoom-target { width: 100%; height: 100%; position: relative; display: flex; align-items: center; justify-content: center; z-index: 1; }
    .zoom-target::before { content: "IMAGE TARGET"; color: rgba(255,255,255,0.5); font-family: "TheGoodMonolith", monospace; font-size: 0.75em; font-weight: 400; text-transform: uppercase; letter-spacing: 2px; }
    .split-screen-container.active .zoom-target::before { display: none; }

    /* Image Title Overlay */
    .image-title-overlay { position: absolute; bottom: 40px; left: 40px; color: white; z-index: 4; opacity: 0; pointer-events: none; }
    .image-title-overlay.active { opacity: 0; }

    .image-slide-number { position: relative; width: 400px; height: 20px; margin-bottom: 0.5em; clip-path: polygon(0% 0%,100% 0%,100% 100%,0% 100%); overflow: hidden; }
    .image-slide-number span { position: absolute; top: 0; left: 0; color: white; font-family: "TheGoodMonolith", monospace; font-size: 12px; font-weight: 400; line-height: 1.5; transform: translateY(0px); will-change: transform; text-transform: uppercase; letter-spacing: 0.1em; }

    .image-slide-title { position: relative; width: 400px; height: 60px; margin-bottom: 1em; clip-path: polygon(0% 0%,100% 0%,100% 100%,0% 100%); overflow: hidden; }
    .image-slide-title h1 { position: absolute; top: 0; left: 0; color: white; font-family: "PPNeueMontreal", sans-serif; font-size: 48px; font-weight: 500; letter-spacing: -0.02em; line-height: 1.2; transform: translateY(0px); will-change: transform; }

    .image-slide-description { position: relative; width: 400px; min-height: 80px; clip-path: polygon(0% 0%,100% 0%,100% 100%,0% 100%); overflow: hidden; }
    .description-line { position: relative; display: block; color: rgba(255,255,255,0.8); font-family: "PPNeueMontreal", sans-serif; font-size: 16px; font-weight: 300; line-height: 1.4; transform: translateY(0px); will-change: transform; overflow: hidden; }

    @media (max-width: 900px) {
      .image-title-overlay { bottom: 20px; left: 20px; }
      .image-slide-number { width: 300px; height: 18px; }
      .image-slide-number span { font-size: 10px; }
      .image-slide-title { width: 300px; height: 50px; }
      .image-slide-title h1 { font-size: 36px; }
      .image-slide-description { width: 300px; min-height: 70px; }
      .description-line { font-size: 14px; }
    }

    /* Close Button */
    .close-button {
      position: fixed; top: 50%; right: 20px; width: 64px; height: 64px;
      background: none; border: none; border-color: transparent; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      z-index: 5; opacity: 0; pointer-events: none; transform: translate(40px, -50%);
    }
    .close-button.active { pointer-events: all; }
    .close-button:hover { opacity: 0.7; }
    .close-button svg { width: 64px; height: 64px; transform: rotate(180deg); }

    /* Scaling overlay */
    .scaling-image-overlay { position: fixed; top: 0; left: 0; z-index: 3; pointer-events: none; will-change: transform; opacity: 1 !important; }
    .scaling-image-overlay img { width: 100%; height: 100%; object-fit: cover; display: block; }

    /* Controls */
    .controls-container {
      position: fixed; bottom: 1.25em; left: 50%; transform: translateX(-50%);
      display: flex; z-index: 6; opacity: 0;
      transition: left 1.2s cubic-bezier(0.87,0,0.13,1);
    }
    .controls-container.visible { opacity: 1; }
    .controls-container.split-mode { left: 75%; }

    .percentage-indicator {
      background-color: #f0f0f0;
      background-image: radial-gradient(rgba(0,0,0,0.015) 1px, transparent 0);
      background-size: 0.44em 0.44em; background-position: -0.06em -0.06em;
      padding: 0.625em 1.25em; border-radius: 0.25em;
      display: flex; align-items: center; justify-content: center;
      font-family: "TheGoodMonolith", monospace; font-size: 0.75em;
      font-weight: 400; text-transform: uppercase; color: #333; min-width: 5em; white-space: nowrap;
    }
    .switch {
      display: flex; gap: 1.25em; background-color: #222;
      background-image: radial-gradient(rgba(255,255,255,0.015) 1px, transparent 0);
      background-size: 0.44em 0.44em; background-position: -0.06em -0.06em;
      padding: 0.625em 1.25em; border-radius: 0.25em; transition: padding 0.3s ease-in-out;
    }
    .sound-toggle {
      background-color: #f0f0f0;
      background-image: radial-gradient(rgba(0,0,0,0.015) 1px, transparent 0);
      background-size: 0.44em 0.44em; background-position: -0.06em -0.06em;
      padding: 0.5em 0.75em; border-radius: 0.25em;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; transition: all 0.3s ease; min-width: 3.75em;
      position: relative; border-color: transparent;
    }
    .sound-wave-canvas { width: 2em; height: 1em; border: none !important; outline: none !important; background: none !important; }
    .switch-button {
      background: none; border: none; border-color: transparent; color: #666;
      cursor: pointer; font-family: "TheGoodMonolith", monospace; font-size: 0.75em;
      font-weight: 400; text-transform: uppercase; padding: 5px 10px;
      position: relative; transition: all 0.3s ease-in-out; white-space: nowrap;
    }
    .switch-button-current { color: #f0f0f0; }
    .indicator-dot {
      position: absolute; width: 5px; height: 5px; background-color: #f0f0f0;
      border-radius: 50%; opacity: 0; transition: opacity 0.3s ease-in-out;
      top: 50%; transform: translateY(-50%); left: -8px;
    }
    .switch-button:hover .indicator-dot { opacity: 1; }

    /* Vignette */
    .page-vignette-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 9998; }
    .page-vignette-extreme {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      mix-blend-mode: overlay;
      background: linear-gradient(to bottom, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0.5) 20%, transparent 40%);
    }
  </style>

  <script data-cfasync="false" src="/cdn-cgi/scripts/5c5dd728/cloudflare-static/email-decode.min.js"></script><script>
    gsap.registerPlugin(Draggable, InertiaPlugin, CustomEase, Flip);

    /* ── PRELOADER ── */
    class PreloaderManager {
      constructor() {
        this.overlay = null; this.canvas = null; this.ctx = null;
        this.animationId = null; this.startTime = null; this.duration = 2000;
        this.createLoadingScreen();
      }
      createLoadingScreen() {
        this.overlay = document.getElementById("preloader-overlay");
        this.overlay.style.cssText = "position:fixed;top:0;left:0;width:100%;height:100%;background:#000;display:flex;justify-content:center;align-items:center;z-index:100000;";
        this.canvas = document.createElement("canvas");
        this.canvas.width = 300; this.canvas.height = 300;
        this.ctx = this.canvas.getContext("2d");
        this.overlay.appendChild(this.canvas);
        this.startAnimation();
      }
      startAnimation() {
        const cx = 150, cy = 150;
        let time = 0, lastTime = 0;
        const rings = [{radius:20,count:8},{radius:35,count:12},{radius:50,count:16},{radius:65,count:20},{radius:80,count:24}];
        const h2r = hex => [parseInt(hex.slice(1,3),16),parseInt(hex.slice(3,5),16),parseInt(hex.slice(5,7),16)];
        const animate = ts => {
          if (!this.startTime) this.startTime = ts;
          if (!lastTime) lastTime = ts;
          time += (ts - lastTime) * 0.001; lastTime = ts;
          this.ctx.clearRect(0, 0, 300, 300);
          this.ctx.beginPath(); this.ctx.arc(cx, cy, 3, 0, Math.PI*2);
          this.ctx.fillStyle = "rgba(44,27,20,0.9)"; this.ctx.fill();
          rings.forEach((ring, ri) => {
            for (let i = 0; i < ring.count; i++) {
              const angle = (i/ring.count)*Math.PI*2;
              const rp = Math.sin(time*2 - ri*0.4)*3;
              const x = cx + Math.cos(angle)*(ring.radius+rp);
              const y = cy + Math.sin(angle)*(ring.radius+rp);
              const ow = 0.4 + Math.sin(time*2 - ri*0.4 + i*0.2)*0.6;
              const active = Math.sin(time*2 - ri*0.4 + i*0.2) > 0.6;
              const [r,g,b] = active ? h2r("#A64B23") : h2r("#2C1B14");
              this.ctx.beginPath(); this.ctx.moveTo(cx,cy); this.ctx.lineTo(x,y);
              this.ctx.lineWidth = 0.8;
              this.ctx.strokeStyle = `rgba(${r},${g},${b},${ow*(active?0.7:0.5)})`; this.ctx.stroke();
              this.ctx.beginPath(); this.ctx.arc(x,y,2.5,0,Math.PI*2);
              this.ctx.fillStyle = `rgba(${r},${g},${b},${ow})`; this.ctx.fill();
            }
          });
          if (ts - this.startTime >= this.duration) { this.complete(this._onComplete); return; }
          this.animationId = requestAnimationFrame(animate);
        };
        this.animationId = requestAnimationFrame(animate);
      }
      complete(onComplete) {
        this._onComplete = onComplete || this._onComplete;
        if (this.animationId) cancelAnimationFrame(this.animationId);
        if (this.overlay) {
          this.overlay.style.opacity = "0"; this.overlay.style.transition = "opacity 0.8s ease";
          setTimeout(() => { this.overlay?.remove(); if (this._onComplete) this._onComplete(); }, 800);
        }
      }
    }

    /* ── GALLERY ── */
    class FashionGallery {
      constructor() {
        this.viewport           = document.getElementById("viewport");
        this.canvasWrapper      = document.getElementById("canvasWrapper");
        this.gridContainer      = document.getElementById("gridContainer");
        this.splitScreenContainer = document.getElementById("splitScreenContainer");
        this.imageTitleOverlay  = document.getElementById("imageTitleOverlay");
        this.closeButton        = document.getElementById("closeButton");
        this.controlsContainer  = document.getElementById("controlsContainer");
        this.soundToggle        = document.getElementById("soundToggle");

        this.customEase = CustomEase.create("smooth", ".87,0,.13,1");
        this.centerEase = CustomEase.create("center", ".25,.46,.45,.94");

        this.config = { itemSize:320, baseGap:16, rows:8, cols:5, currentZoom:0.6, currentGap:32 };

        // Override grid config from admin panel if saved
        try {
          const stored = JSON.parse(localStorage.getItem("portfolio_content"));
          if (stored && stored.grid) {
            this.config.cols     = stored.grid.cols     || 8;
            this.config.rows     = stored.grid.rows     || 5;
            this.config.itemSize = stored.grid.itemSize || 320;
          }
        } catch(e) {}
        this.zoomState = { isActive:false, selectedItem:null, flipAnimation:null, scalingOverlay:null };
        this.gridItems = []; this.gridDimensions = {};
        this.lastValidPosition = { x:0, y:0 };
        this.draggable = null; this.viewportObserver = null;

        this.initSoundSystem();
        this.initImageData();
      }

      initSoundSystem() {
        this.soundSystem = {
          enabled: false,
          sounds: {
            click:        new Audio("https://assets.codepen.io/7558/glitch-fx-001.mp3"),
            open:         new Audio("https://assets.codepen.io/7558/click-glitch-001.mp3"),
            close:        new Audio("https://assets.codepen.io/7558/click-glitch-001.mp3"),
            "zoom-in":    new Audio("https://assets.codepen.io/7558/whoosh-fx-001.mp3"),
            "zoom-out":   new Audio("https://assets.codepen.io/7558/whoosh-fx-001.mp3"),
            "drag-start": new Audio("https://assets.codepen.io/7558/preloader-2s-001.mp3"),
            "drag-end":   new Audio("https://assets.codepen.io/7558/preloader-2s-001.mp3")
          },
          play: (name) => {
            if (!this.soundSystem.enabled || !this.soundSystem.sounds[name]) return;
            try { const a = this.soundSystem.sounds[name]; a.currentTime=0; a.play().catch(()=>{}); } catch(e) {}
          },
          toggle: () => {
            this.soundSystem.enabled = !this.soundSystem.enabled;
            this.soundToggle.classList.toggle("active", this.soundSystem.enabled);
            if (this.zoomState.isActive) return;
            if (this.soundSystem.enabled) setTimeout(() => this.soundSystem.play("click"), 50);
          }
        };
        Object.values(this.soundSystem.sounds).forEach(a => { a.preload="auto"; a.volume=0.3; });
        this.initSoundWave();
      }

      initSoundWave() {
        const canvas = document.getElementById("soundWaveCanvas");
        if (!canvas) return;
        const ctx = canvas.getContext("2d");
        const W=32, H=16, cy=Math.floor(H/2);
        let amp = 0;
        const ic = (c1,c2,f) => {
          const p = v => [parseInt(v.slice(1,3),16),parseInt(v.slice(3,5),16),parseInt(v.slice(5,7),16)];
          const [r1,g1,b1]=p(c1), [r2,g2,b2]=p(c2);
          return `#${[r1+f*(r2-r1),g1+f*(g2-g1),b1+f*(b2-b1)].map(v=>Math.round(v).toString(16).padStart(2,"0")).join("")}`;
        };
        const draw = () => {
          amp += ((this.soundSystem.enabled?1:0) - amp)*0.08;
          ctx.clearRect(0,0,W,H);
          const t = Date.now()/1000, mf = 1-amp;
          if (!this.soundSystem.enabled && amp<0.01) { ctx.fillStyle="#D9C4AA"; ctx.fillRect(0,cy,W,2); }
          else {
            ctx.fillStyle=ic("#2C1B14","#D9C4AA",mf);
            for (let i=0;i<W;i++) { const x=i-W/2,e=Math.exp(-x*x/50),y=cy+Math.cos(x*0.4-t*8)*e*H*0.35*amp; ctx.fillRect(i,Math.round(y),1,2); }
            ctx.fillStyle=ic("#A64B23","#D9C4AA",mf);
            for (let i=0;i<W;i++) { const x=i-W/2,e=Math.exp(-x*x/80),y=cy+Math.cos(x*0.3-t*5)*e*H*0.25*amp; ctx.fillRect(i,Math.round(y),1,2); }
          }
          requestAnimationFrame(draw);
        };
        draw();
      }

      initImageData() {
        // ── Load from Admin Panel (localStorage) or fall back to defaults ──
        const STORAGE_KEY = "portfolio_content";
        let stored = null;
        try { stored = JSON.parse(localStorage.getItem(STORAGE_KEY)); } catch(e) {}

        const DEFAULT_IMAGES = [
          {url:"https://assets.codepen.io/7558/orange-portrait_01.jpg",title:"Begin Before You're Ready",description:"The work starts when you notice the quiet pull. Breathe once, clear the room inside you, and move one pixel forward."},
          {url:"https://assets.codepen.io/7558/orange-portrait_02.jpg",title:"Negative Space, Positive Signal",description:"Leave room around the idea. In the silence, the design answers back and shows you what to remove."},
          {url:"https://assets.codepen.io/7558/orange-portrait_03.jpg",title:"Friction Is a Teacher",description:"When the line resists, listen. Constraints are coordinates—plot them, then chart a cleaner route."},
          {url:"https://assets.codepen.io/7558/orange-portrait_04.jpg",title:"Golden Minute",description:"Catch the light while it's honest. One honest frame beats a hundred almosts."},
          {url:"https://assets.codepen.io/7558/orange-portrait_05.jpg",title:"Shadow Carries Form",description:"The dark reveals the edge. Let contrast articulate what you mean but can't yet say."},
          {url:"https://assets.codepen.io/7558/orange-portrait_06.jpg",title:"City Breath",description:"Steel, glass, heartbeat. Edit until the street's rhythm fits inside a single grid."},
          {url:"https://assets.codepen.io/7558/orange-portrait_07.jpg",title:"Soft Focus, Sharp Intent",description:"Blur the noise, not the purpose. What matters remains in crisp relief."},
          {url:"https://assets.codepen.io/7558/orange-portrait_08.jpg",title:"Time-Tested, Future-Ready",description:"Classics survive because they serve. Keep the spine, tune the surface, respect the lineage."},
        ];

        const images = (stored && stored.images && stored.images.length > 0) ? stored.images : DEFAULT_IMAGES;

        // Build fashionImages URLs array
        this.fashionImages = images.map(img => img.url).filter(Boolean);
        if (this.fashionImages.length === 0) this.fashionImages = DEFAULT_IMAGES.map(i=>i.url);

        // Build imageData array
        this.imageData = images.map((img, i) => ({
          number: String(i+1).padStart(2,"0"),
          title: img.title || `Image ${i+1}`,
          description: img.description || ""
        }));

        // ── Apply visibility toggles ──
        const v = (stored && stored.visibility) ? stored.visibility : {};
        const hide = (el) => { if(el) el.style.display = "none"; };
        const show = (el, d="") => { if(el) el.style.display = d; };
        const applyVis = (key, el, displayVal="") => {
          if (v[key] === false) hide(el); else show(el, displayVal);
        };

        // Logo
        applyVis("logo", document.querySelector(".logo-container"), "block");

        // Menu title & nav links
        applyVis("menu-title", document.querySelector(".values-section h3"));
        const navLinks = document.querySelectorAll(".values-section ul li");
        ["nav1","nav2","nav3","nav4"].forEach((k,i) => { if(navLinks[i]) applyVis(k, navLinks[i]); });

        // Studio section
        applyVis("studio-title", document.querySelector(".location-section h3"));
        const locPs = document.querySelectorAll(".location-section p");
        applyVis("city",  locPs[0]);
        applyVis("state", locPs[1]);

        // Connect section
        applyVis("connect-title", document.querySelector(".contact-section h3"));
        applyVis("email", document.querySelector(".contact-section p"));

        // Follow section
        applyVis("follow-title", document.querySelector(".social-section h3"));
        const socialLis = document.querySelectorAll(".social-section ul li");
        applyVis("instagram", socialLis[0]);
        applyVis("twitter",   socialLis[1]);
        applyVis("linkedin",  socialLis[2]);

        // Footer
        const footerPs = document.querySelectorAll(".info-section p");
        applyVis("tagline", footerPs[0]);
        applyVis("coords",  footerPs[1]);
        const b = (stored && stored.branding) ? stored.branding : {};
        const s = (stored && stored.social)   ? stored.social   : {};

        if (b.city)    { const els = document.querySelectorAll(".location-section p"); if(els[0]) els[0].textContent = b.city; }
        if (b.state)   { const els = document.querySelectorAll(".location-section p"); if(els[1]) els[1].textContent = b.state; }
        if (b.tagline) { const els = document.querySelectorAll(".info-section p");     if(els[0]) els[0].textContent = b.tagline; }
        if (b.coords)  { const els = document.querySelectorAll(".info-section p");     if(els[1]) els[1].textContent = b.coords; }

        // Nav links
        const navLinkAs = document.querySelectorAll(".values-section ul li a");
        if(b.nav1 && navLinkAs[0]) navLinkAs[0].textContent = b.nav1;
        if(b.nav2 && navLinkAs[1]) navLinkAs[1].textContent = b.nav2;
        if(b.nav3 && navLinkAs[2]) navLinkAs[2].textContent = b.nav3;
        if(b.nav4 && navLinkAs[3]) navLinkAs[3].textContent = b.nav4;

        // Email
        if (s.email) { const el = document.querySelector(".contact-section a"); if(el){ el.href=`mailto:${s.email}`; el.textContent=s.email; } }

        // Social links
        const socialLinks = document.querySelectorAll(".social-section ul li a");
        if(s.instagram && socialLinks[0]) socialLinks[0].href = `https://instagram.com/${s.instagram}`;
        if(s.twitter   && socialLinks[1]) socialLinks[1].href = `https://x.com/${s.twitter}`;
        if(s.linkedin  && socialLinks[2]) socialLinks[2].href = `https://linkedin.com/in/${s.linkedin}`;
      }

      splitTextIntoLines(element, text) {
        element.innerHTML = "";
        const w = element.offsetWidth || 400;
        const temp = document.createElement("div");
        temp.style.cssText = `position:absolute;visibility:hidden;width:${w}px;font-family:'PPNeueMontreal',sans-serif;font-size:16px;font-weight:300;line-height:1.4;`;
        document.body.appendChild(temp);
        const lines = []; let cur = "";
        text.split(" ").forEach(word => {
          const test = cur ? `${cur} ${word}` : word;
          temp.textContent = test;
          if (temp.offsetWidth > w && cur) { lines.push(cur); cur = word; } else cur = test;
        });
        if (cur) lines.push(cur);
        document.body.removeChild(temp);
        lines.forEach(lt => { const s=document.createElement("span"); s.className="description-line"; s.textContent=lt; element.appendChild(s); });
        return element.querySelectorAll(".description-line");
      }

      calculateGapForZoom(z) { return z>=1.0?16:z>=0.6?32:64; }

      calculateGridDimensions(gap = this.config.currentGap) {
        const w = this.config.cols*(this.config.itemSize+gap)-gap;
        const h = this.config.rows*(this.config.itemSize+gap)-gap;
        this.gridDimensions = { width:w, height:h, scaledWidth:w*this.config.currentZoom, scaledHeight:h*this.config.currentZoom, gap };
        return this.gridDimensions;
      }

      generateGridItems() {
        this.config.currentGap = this.calculateGapForZoom(this.config.currentZoom);
        this.calculateGridDimensions();
        this.canvasWrapper.style.width  = this.gridDimensions.width+"px";
        this.canvasWrapper.style.height = this.gridDimensions.height+"px";
        this.gridContainer.innerHTML = ""; this.gridItems = [];
        let idx = 0;
        for (let row=0; row<this.config.rows; row++) {
          for (let col=0; col<this.config.cols; col++) {
            const item = document.createElement("div"); item.className="grid-item";
            const x = col*(this.config.itemSize+this.config.currentGap);
            const y = row*(this.config.itemSize+this.config.currentGap);
            item.style.left=`${x}px`; item.style.top=`${y}px`; item.style.opacity="0";
            const url = this.fashionImages[idx%this.fashionImages.length]; idx++;
            const img = document.createElement("img"); img.src=url; img.alt=`Fashion Portrait ${idx}`;
            item.appendChild(img);
            const data = { element:item, img, row, col, baseX:x, baseY:y, imageUrl:url, index:this.gridItems.length };
            item.addEventListener("click",()=>{ if(!this.zoomState.isActive){ this.soundSystem.play("click"); this.enterZoomMode(data); } });
            this.gridContainer.appendChild(item); this.gridItems.push(data);
          }
        }
      }

      setupViewportObserver() {
        if (this.viewportObserver) this.viewportObserver.disconnect();
        this.viewportObserver = new IntersectionObserver(entries => {
          entries.forEach(e => {
            if (this.zoomState.selectedItem && e.target===this.zoomState.selectedItem.element) return;
            if (e.isIntersecting) { e.target.classList.remove("out-of-view"); gsap.to(e.target,{opacity:1,duration:0.6,ease:"power2.out"}); }
            else { e.target.classList.add("out-of-view"); gsap.to(e.target,{opacity:0.1,duration:0.6,ease:"power2.out"}); }
          });
        }, { root:null, threshold:0.15, rootMargin:"10%" });
        this.gridItems.forEach(item => this.viewportObserver.observe(item.element));
      }

      updateTitleOverlay(imageIndex) {
        const d = this.imageData[imageIndex%this.imageData.length];
        const nEl = document.querySelector("#imageSlideNumber span");
        const tEl = document.querySelector("#imageSlideTitle h1");
        const dEl = document.getElementById("imageSlideDescription");
        if (nEl&&tEl&&dEl) { nEl.textContent=d.number; tEl.textContent=d.title; this.descriptionLines=this.splitTextIntoLines(dEl,d.description); }
      }

      createScalingOverlay(sourceImg) {
        const ov = document.createElement("div"); ov.className="scaling-image-overlay";
        const img = document.createElement("img"); img.src=sourceImg.src; img.alt=sourceImg.alt;
        ov.appendChild(img); document.body.appendChild(ov);
        const r = sourceImg.getBoundingClientRect();
        gsap.set(ov,{left:r.left,top:r.top,width:r.width,height:r.height,opacity:1});
        return ov;
      }

      enterZoomMode(sel) {
        if (this.zoomState.isActive) return;
        this.zoomState.isActive=true; this.zoomState.selectedItem=sel;
        this.soundSystem.play("open");
        if (this.draggable) this.draggable.disable();
        document.body.classList.add("zoom-mode");
        const sc = this.splitScreenContainer, zt = document.getElementById("zoomTarget");
        sc.classList.add("active"); gsap.to(sc,{opacity:1,duration:1.2,ease:this.customEase});
        this.zoomState.scalingOverlay = this.createScalingOverlay(sel.img);
        gsap.set(sel.img,{opacity:0});
        this.zoomState.flipAnimation = Flip.fit(this.zoomState.scalingOverlay, zt, {
          duration:1.2, ease:this.customEase, absolute:true,
          onComplete:()=>{
            this.updateTitleOverlay(sel.index);
            const ov=this.imageTitleOverlay;
            gsap.set("#imageSlideNumber span",{y:20,opacity:0});
            gsap.set("#imageSlideTitle h1",{y:60,opacity:0});
            gsap.set(this.descriptionLines,{y:80,opacity:0});
            ov.classList.add("active"); gsap.to(ov,{opacity:1,duration:0.3,ease:"power2.out"});
            gsap.to("#imageSlideNumber span",{duration:0.8,y:0,opacity:1,ease:this.customEase,delay:0.1});
            gsap.to("#imageSlideTitle h1",{duration:0.8,y:0,opacity:1,ease:this.customEase,delay:0.15});
            gsap.to(this.descriptionLines,{duration:0.8,y:0,opacity:1,ease:this.customEase,delay:0.2,stagger:0.15});
          }
        });
        this.controlsContainer.classList.add("split-mode");
        gsap.fromTo(this.closeButton,{x:40,opacity:0},{x:0,opacity:1,duration:0.6,ease:"power2.out",delay:0.9});
        this.closeButton.classList.add("active");
        document.getElementById("splitLeft").addEventListener("click",this.handleSplitAreaClick.bind(this));
        document.getElementById("splitRight").addEventListener("click",this.handleSplitAreaClick.bind(this));
        document.addEventListener("keydown",this.handleZoomKeys.bind(this));
      }

      handleSplitAreaClick(e) { if (e.target===e.currentTarget) this.exitZoomMode(); }

      exitZoomMode() {
        if (!this.zoomState.isActive||!this.zoomState.selectedItem||!this.zoomState.scalingOverlay) return;
        this.soundSystem.play("close");
        document.removeEventListener("keydown",this.handleZoomKeys);
        const sl=document.getElementById("splitLeft"), sr=document.getElementById("splitRight");
        if(sl) sl.removeEventListener("click",this.handleSplitAreaClick);
        if(sr) sr.removeEventListener("click",this.handleSplitAreaClick);
        const sc=this.splitScreenContainer, el=this.zoomState.selectedItem.element, img=this.zoomState.selectedItem.img;
        if (this.zoomState.flipAnimation) this.zoomState.flipAnimation.kill();
        const ov=this.imageTitleOverlay;
        gsap.to(ov,{opacity:0,duration:0.3,ease:"power2.out"});
        gsap.to("#imageSlideNumber span",{duration:0.4,y:-20,opacity:0,ease:"power2.out"});
        gsap.to("#imageSlideTitle h1",{duration:0.4,y:-60,opacity:0,ease:"power2.out"});
        if (this.descriptionLines) {
          gsap.to(this.descriptionLines,{duration:0.4,y:-80,opacity:0,ease:"power2.out",stagger:-0.05,
            onComplete:()=>{ ov.classList.remove("active"); gsap.set("#imageSlideNumber span",{y:20,opacity:0}); gsap.set("#imageSlideTitle h1",{y:60,opacity:0}); gsap.set(this.descriptionLines,{y:80,opacity:0}); }});
        }
        gsap.to(this.closeButton,{duration:0.3,opacity:0,x:40,ease:"power2.in"});
        sc.classList.remove("active"); this.controlsContainer.classList.remove("split-mode");
        gsap.to(sc,{opacity:0,duration:0.8,ease:"power2.out"});
        if (this.zoomState.scalingOverlay) gsap.to(this.zoomState.scalingOverlay,{opacity:0.4,duration:0.8,ease:"power2.out"});
        Flip.fit(this.zoomState.scalingOverlay, el, {
          duration:1.2, ease:this.customEase, absolute:true,
          onComplete:()=>{
            gsap.set(img,{opacity:1});
            if (this.zoomState.scalingOverlay) { document.body.removeChild(this.zoomState.scalingOverlay); this.zoomState.scalingOverlay=null; }
            sc.classList.remove("active"); document.body.classList.remove("zoom-mode");
            this.closeButton.classList.remove("active");
            if (this.draggable) this.draggable.enable();
            this.zoomState.isActive=false; this.zoomState.selectedItem=null; this.zoomState.flipAnimation=null;
          }
        });
      }

      handleZoomKeys(e) { if (this.zoomState.isActive&&e.key==="Escape") this.exitZoomMode(); }

      calculateBounds() {
        const vw=window.innerWidth, vh=window.innerHeight;
        const {scaledWidth:sw,scaledHeight:sh}=this.gridDimensions;
        const mx=this.config.currentGap*this.config.currentZoom, my=mx;
        let minX,maxX,minY,maxY;
        if(sw<=vw){const cx=(vw-sw)/2;minX=maxX=cx;}else{maxX=mx;minX=vw-sw-mx;}
        if(sh<=vh){const cy=(vh-sh)/2;minY=maxY=cy;}else{maxY=my;minY=vh-sh-my;}
        return{minX,maxX,minY,maxY};
      }

      initDraggable() {
        if (this.draggable) this.draggable.kill();
        this.calculateGridDimensions(this.config.currentGap);
        const bounds=this.calculateBounds();
        this.draggable=Draggable.create(this.canvasWrapper,{
          type:"x,y", bounds, edgeResistance:0.8, inertia:true,
          throwProps:{x:{velocity:"auto",resistance:300,end:v=>Math.round(v)},y:{velocity:"auto",resistance:300,end:v=>Math.round(v)}},
          onDragStart:()=>{ document.body.classList.add("dragging"); this.soundSystem.play("drag-start"); this.lastValidPosition.x=this.draggable.x; this.lastValidPosition.y=this.draggable.y; },
          onDrag:()=>{ this.lastValidPosition.x=this.draggable.x; this.lastValidPosition.y=this.draggable.y; },
          onDragEnd:()=>{ document.body.classList.remove("dragging"); this.soundSystem.play("drag-end"); }
        })[0];
      }

      handleMouseLeave() {
        if (document.body.classList.contains("dragging")) {
          document.body.classList.remove("dragging");
          gsap.to(this.canvasWrapper,{duration:0.6,x:this.lastValidPosition.x,y:this.lastValidPosition.y,ease:"power2.out"});
          if(this.draggable) this.draggable.endDrag();
        }
      }

      calculateFitZoom() {
        const vw=window.innerWidth, vh=window.innerHeight-80, gap=this.calculateGapForZoom(1.0);
        const gw=this.config.cols*(this.config.itemSize+gap)-gap, gh=this.config.rows*(this.config.itemSize+gap)-gap;
        return Math.max(0.1,Math.min(2.0,Math.min((vw-80)/gw,(vh-80)/gh)));
      }

      playIntroAnimation() {
        const vw=window.innerWidth, vh=window.innerHeight;
        const m=new DOMMatrix(getComputedStyle(this.canvasWrapper).transform);
        const cx=(vw/2-m.m41)/m.a-this.config.itemSize/2;
        const cy=(vh/2-m.m42)/m.a-this.config.itemSize/2;
        this.gridItems.forEach((d,i)=>gsap.set(d.element,{left:cx,top:cy,scale:0.8,zIndex:this.gridItems.length-i,opacity:0}));
        gsap.to(this.gridItems.map(d=>d.element),{
          duration:0.2,
          left:i=>this.gridItems[i].baseX, top:i=>this.gridItems[i].baseY,
          scale:1, opacity:1, ease:"power2.out",
          stagger:{amount:1.5,from:"start",grid:[this.config.rows,this.config.cols]},
          onComplete:()=>{
            this.gridItems.forEach(d=>gsap.set(d.element,{zIndex:1}));
            const pi=this.controlsContainer.querySelector(".percentage-indicator");
            const sw=this.controlsContainer.querySelector(".switch");
            const st=this.controlsContainer.querySelector(".sound-toggle");
            gsap.set(this.controlsContainer,{opacity:0}); gsap.set(pi,{x:"-3em"}); gsap.set(sw,{y:"2em"}); gsap.set(st,{x:"3em"});
            const tl=gsap.timeline();
            tl.to(this.controlsContainer,{opacity:1,duration:0.5,ease:"power2.out"},0);
            tl.to(pi,{x:0,duration:0.2,ease:"power2.out"},0.25);
            tl.to(sw,{y:0,duration:0.2,ease:"power2.out"},0.30);
            tl.to(st,{x:0,duration:0.2,ease:"power2.out"},0.35);
            this.controlsContainer.classList.add("visible");
          }
        });
      }

      _applyZoom(zoomLevel, buttonElement, oldZoom) {
        const newGap=this.calculateGapForZoom(zoomLevel);
        this.config.currentZoom=zoomLevel;
        this.calculateGridDimensions(this.config.currentGap);
        const vw=window.innerWidth, vh=window.innerHeight;
        const cx=(vw-this.gridDimensions.width*oldZoom)/2;
        const cy=(vh-this.gridDimensions.height*oldZoom)/2;
        gsap.to(this.canvasWrapper,{duration:0.6,x:cx,y:cy,ease:this.centerEase,
          onComplete:()=>{
            if(newGap!==this.config.currentGap){
              this.gridItems.forEach(d=>{
                const nx=d.col*(this.config.itemSize+newGap), ny=d.row*(this.config.itemSize+newGap);
                d.baseX=nx; d.baseY=ny;
                gsap.to(d.element,{duration:1.2,left:nx,top:ny,ease:this.customEase});
              });
              const nw=this.config.cols*(this.config.itemSize+newGap)-newGap, nh=this.config.rows*(this.config.itemSize+newGap)-newGap;
              gsap.to(this.canvasWrapper,{duration:1.2,width:nw,height:nh,ease:this.customEase});
              this.config.currentGap=newGap;
            }
            this.calculateGridDimensions(newGap);
            const fcx=(vw-this.gridDimensions.width*zoomLevel)/2, fcy=(vh-this.gridDimensions.height*zoomLevel)/2;
            gsap.to(this.canvasWrapper,{duration:1.2,scale:zoomLevel,x:fcx,y:fcy,ease:this.customEase,
              onComplete:()=>{ this.lastValidPosition.x=fcx; this.lastValidPosition.y=fcy; this.calculateGridDimensions(newGap); this.initDraggable(); }
            });
          }
        });
        this.updatePercentageIndicator(zoomLevel);
        document.querySelectorAll(".switch-button").forEach(b=>b.classList.remove("switch-button-current"));
        if(buttonElement) buttonElement.classList.add("switch-button-current");
      }

      autoFitZoom(btn=null) {
        if(this.zoomState.isActive){this.exitZoomMode();return;}
        const fz=this.calculateFitZoom(), old=this.config.currentZoom;
        this.soundSystem.play(fz<0.6?"zoom-out":"zoom-in");
        this._applyZoom(fz,btn,old);
      }

      updatePercentageIndicator(z) { document.getElementById("percentageIndicator").textContent=`${Math.round(z*100)}%`; }

      setZoom(zoomLevel,btn=null) {
        if(this.zoomState.isActive){this.exitZoomMode();return;}
        const old=this.config.currentZoom;
        this.soundSystem.play(zoomLevel<old?"zoom-out":"zoom-in");
        this._applyZoom(zoomLevel,btn,old);
        if(!btn){
          const btns=document.querySelectorAll(".switch-button");
          if(zoomLevel===0.3)btns[0].classList.add("switch-button-current");
          else if(zoomLevel===0.6)btns[1].classList.add("switch-button-current");
          else if(zoomLevel===1.0)btns[2].classList.add("switch-button-current");
        }
      }

      resetPosition() {
        if(this.zoomState.isActive){this.exitZoomMode();return;}
        this.calculateGridDimensions(this.config.currentGap);
        const vw=window.innerWidth, vh=window.innerHeight;
        const cx=(vw-this.gridDimensions.scaledWidth)/2, cy=(vh-this.gridDimensions.scaledHeight)/2;
        gsap.to(this.canvasWrapper,{duration:1.0,x:cx,y:cy,ease:this.centerEase,
          onComplete:()=>{ this.lastValidPosition.x=cx; this.lastValidPosition.y=cy; this.initDraggable(); }});
      }

      init() {
        this.config.currentGap=this.calculateGapForZoom(this.config.currentZoom);
        this.generateGridItems();
        gsap.set(this.viewport,{opacity:0});
        gsap.set(this.canvasWrapper,{scale:this.config.currentZoom});
        this.calculateGridDimensions(this.config.currentGap);
        const vw=window.innerWidth, vh=window.innerHeight;
        const cx=(vw-this.gridDimensions.scaledWidth)/2, cy=(vh-this.gridDimensions.scaledHeight)/2;
        gsap.set(this.canvasWrapper,{x:cx,y:cy});
        this.lastValidPosition.x=cx; this.lastValidPosition.y=cy;
        this.updatePercentageIndicator(this.config.currentZoom);
        this.setupEventListeners();
        gsap.to(this.viewport,{duration:0.6,opacity:1,ease:"power2.inOut",
          onComplete:()=>{
            this.playIntroAnimation();
            gsap.to(".header",{duration:1.2,opacity:1,ease:"power2.out",delay:0.8});
            gsap.to(".footer",{duration:1.4,opacity:1,ease:"power2.out",delay:1.0});
            setTimeout(()=>{ this.initDraggable(); this.setupViewportObserver(); },1500);
          }
        });
      }

      setupEventListeners() {
        window.addEventListener("resize",()=>setTimeout(()=>{ this.resetPosition(); this.initDraggable(); },100));
        document.addEventListener("mouseleave",()=>this.handleMouseLeave());
        this.viewport.addEventListener("mouseleave",()=>this.handleMouseLeave());
        this.closeButton.addEventListener("click",()=>this.exitZoomMode());
        this.soundToggle.addEventListener("click",()=>this.soundSystem.toggle());
        document.addEventListener("keydown",e=>{
          if(this.zoomState.isActive) return;
          if(e.key==="1")this.setZoom(0.3);
          else if(e.key==="2")this.setZoom(0.6);
          else if(e.key==="3")this.setZoom(1.0);
          else if(e.key==="f"||e.key==="F")this.autoFitZoom();
        });
      }
    }

    /* Boot */
    let gallery;

    function startGallery() {
      if (gallery) return;
      gallery = new FashionGallery();
      gallery.init();
    }

    // Safety net — force start after 4s no matter what
    setTimeout(startGallery, 4000);

    document.addEventListener("DOMContentLoaded", () => {
      try {
        const preloader = new PreloaderManager();
        setTimeout(() => {
          preloader.complete(() => { startGallery(); });
        }, 2000);
      } catch(e) {
        startGallery();
      }
    });
  </script>
</body>
</html>
